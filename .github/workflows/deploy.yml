name: Bluepill CI & CD

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: bluepill
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4 # 코드 내려받기

      - name: Set up JDK 21 # Java 21 설정
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle # 성능 최적화를 위해 그래들 캐싱 활용

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build -x test # 테스트 스킵 빌드 실행
        env:
          DB_URL: localhost
          DB_USERNAME: postgres
          DB_PASSWORD: password
          JWT_SECRET: test-jwt-secret-key-should-be-at-least-32-bytes
          JWT_ACCESS_TOKEN_EXPIRATION: 3600
          JWT_REFRESH_TOKEN_EXPIRATION: 604800

  docker:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Hub Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build server
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/bluepill-server:latest -f Dockerfile .

      - name: Push server
        run: docker push ${{ secrets.DOCKER_USERNAME }}/bluepill-server:latest
