name: Bluepill CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: bluepill
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4 # 코드 내려받기

      - name: Set up JDK 21 # Java 21 설정
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle # 성능 최적화를 위해 그래들 캐싱 활용

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build # 테스트 포함 빌드 실행
        env:
          DB_URL: localhost
          DB_USERNAME: postgres
          DB_PASSWORD: password
          JWT_SECRET: test-jwt-secret-key-should-be-at-least-32-bytes
          JWT_ACCESS_TOKEN_EXPIRATION: 3600
          JWT_REFRESH_TOKEN_EXPIRATION: 604800