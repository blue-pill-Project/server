spring:
  datasource:
    # 운영 DB 주소
    url: jdbc:postgresql://${DB_URL:localhost}:5432/bluepill
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect

  sql:
    init:
      mode: never

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false

app:
  frontend:
    oauth-callback-url: ${FRONTEND_OAUTH_CALLBACK_URL}
  cookie:
    secure: true
    same-site: ${COOKIE_SAME_SITE:None}