jwt:
  secret: test-jwt-secret-key-should-be-at-least-32-bytes
  access-token-expiration: 3600
  refresh-token-expiration: 604800

spring:
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-google-client-id
            client-secret: test-google-client-secret
            scope:
              - email
              - profile
          discord:
            client-id: test-discord-client-id
            client-secret: test-discord-client-secret
            scope:
              - identify
              - email
